<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Visualizador Estereoscópico</title>

  <!-- Icono -->
  <link rel="icon" type="image/png" href="img/fav.png">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">Visualizador Estereoscópico</a>
    </div>
  </nav>

  <!-- Contenido -->
  <main class="container my-5">

    <h1 class="text-center mb-4">Carrusel Estereoscópico</h1>

    <!-- Carrusel -->
    <div id="stereoCarousel" class="carousel slide shadow rounded overflow-hidden" data-bs-ride="carousel">
      <div class="carousel-inner">

        <!-- Imagen 1 -->
        <div class="carousel-item active">
          <img src="img/SBS1.JPG" class="d-block w-100" alt="Imagen 1">
        </div>

        <!-- Imagen 2 -->
        <div class="carousel-item">
          <img src="img/SBS2.JPG" class="d-block w-100" alt="Imagen 2">
        </div>

         <!-- Imagen 3 -->
        <div class="carousel-item">
          <img src="img/SBS3.JPG" class="d-block w-100" alt="Imagen 3">
        </div>

         <!-- Imagen 4 -->
        <div class="carousel-item">
          <img src="img/SBS4.JPG" class="d-block w-100" alt="Imagen 4">
        </div>

         <!-- Imagen 5 -->
        <div class="carousel-item">
          <img src="img/SBS5.JPG" class="d-block w-100" alt="Imagen 5">
        </div>

         <!-- Imagen 6 -->
        <div class="carousel-item">
          <img src="img/SBS6.JPG" class="d-block w-100" alt="Imagen 6">
        </div>

         <!-- Imagen 7 -->
        <div class="carousel-item">
          <img src="img/SBS7.JPG" class="d-block w-100" alt="Imagen 7">
        </div>

         <!-- Imagen 8-->
        <div class="carousel-item">
          <img src="img/SBS8.JPG" class="d-block w-100" alt="Imagen 8">
        </div>

         <!-- Imagen 9 -->
        <div class="carousel-item">
          <img src="img/SBS9.JPG" class="d-block w-100" alt="Imagen 9">
        </div>

         <!-- Imagen 10 -->
        <div class="carousel-item">
          <img src="img/SBS10.JPG" class="d-block w-100" alt="Imagen 10">
        </div>

         <!-- Imagen 11 -->
        <div class="carousel-item">
          <img src="img/SBS11.JPG" class="d-block w-100" alt="Imagen 11">
        </div>

         <!-- Imagen 12 -->
        <div class="carousel-item">
          <img src="img/SBS12.JPG" class="d-block w-100" alt="Imagen 12 ">
        </div>

         <!-- Imagen 13 -->
        <div class="carousel-item">
          <img src="img/SBS13.JPG" class="d-block w-100" alt="Imagen 13">
        </div>

         <!-- Imagen 14 -->
        <div class="carousel-item">
          <img src="img/SBS14.JPG" class="d-block w-100" alt="Imagen 14">
        </div>

         <!-- Imagen 15 -->
        <div class="carousel-item">
          <img src="img/SBS15.JPG" class="d-block w-100" alt="Imagen 15">
        </div> 
      </div>

      <button class="carousel-control-prev" type="button" data-bs-target="#stereoCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>

      <button class="carousel-control-next" type="button" data-bs-target="#stereoCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>

    <!-- Botones -->
    <div class="text-center my-4 d-flex justify-content-center gap-3 flex-wrap">
      <button class="button" data-front="Side by Side" data-back="Ver SBS" onclick="mostrarSideBySide()"></button>
      <button class="button" data-front="Anaglifo" data-back="Ver 3D" onclick="mostrarAnaglifo()"></button>
    </div>

    <!-- Visor principal -->
    <div class="viewer-container text-center">

      <!-- Etiquetas SBS -->
<!-- Etiquetas SBS -->
      <div id="sbsLabels" class="d-flex justify-content-between px-4 mb-3">
        <span class="side-badge">Vista Izquierda</span>
        <span class="side-badge">Vista Derecha</span>
      </div>

      <!-- Imagen SBS -->
      <img id="mainViewer" src="img/SBS1.jpg" class="img-fluid rounded shadow" alt="Visualización estereoscópica">

      <!-- Anaglifo -->
      <div id="anaglifoViewer" class="d-none">
  <img id="anaglifoImage" src="img/ana1.jpg" class="img-fluid rounded shadow" alt="Anaglifo">
</div>

    </div>

  </main>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-3 mt-5">
    <p class="mb-0">Desarrollado por Diana Denise Campos Lozano | ITIC'S | Ambientes Virtuales</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- JS -->
  <script src="js/app.js"></script>
</body>
</html>
