<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Visualizador Estereoscópico</title>

  <!-- Icono -->
  <link rel="icon" type="image/png" href="img/icon.png">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">Visualizador Estereoscópico</a>
    </div>
  </nav>

  <!-- Contenido -->
  <main class="container my-5">

    <h1 class="text-center mb-4">Carrusel Estereoscópico</h1>

    <!-- Carrusel -->
    <div id="stereoCarousel" class="carousel slide shadow rounded overflow-hidden" data-bs-ride="carousel">
      <div class="carousel-inner">

        <!-- Imagen 1 -->
        <div class="carousel-item active">
          <img src="img/img1-left.jpg" class="d-block w-100" alt="Imagen 1">
        </div>

        <!-- Imagen 2 -->
        <div class="carousel-item">
          <img src="img/img2-left.jpg" class="d-block w-100" alt="Imagen 2">
        </div>

      </div>

      <button class="carousel-control-prev" type="button" data-bs-target="#stereoCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>

      <button class="carousel-control-next" type="button" data-bs-target="#stereoCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>

    <!-- Botones -->
    <div class="text-center my-4">
      <button class="btn btn-primary me-2" onclick="mostrarSideBySide()">Side by Side</button>
      <button class="btn btn-danger" onclick="mostrarAnaglifo()">Anaglifo</button>
    </div>

    <!-- Visualización -->
    <div id="viewer" class="viewer-container">

      <!-- Side by Side -->
      <div id="sideBySide" class="row g-0">
        <div class="col-6">
          <img src="img/img1-left.jpg" class="img-fluid" alt="Left">
        </div>
        <div class="col-6">
          <img src="img/img1-right.jpg" class="img-fluid" alt="Right">
        </div>
      </div>

      <!-- Anaglifo -->
      <div id="anaglifo" class="anaglifo-container d-none">
        <img src="img/img1-left.jpg" class="anaglifo left-eye" alt="Left Eye">
        <img src="img/img1-right.jpg" class="anaglifo right-eye" alt="Right Eye">
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-3 mt-5">
    <p class="mb-0">Desarrollado por Diana Denise Campos Lozano | ITIC'S | Ambientes Virtuales</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- JS -->
  <script src="js/app.js"></script>
</body>
</html>
