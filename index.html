<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Visualizador Estereoscópico</title>

  <!-- Icono -->
  <link rel="icon" type="image/png" href="img/icon.png">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">Visualizador Estereoscópico</a>
    </div>
  </nav>

  <!-- Contenido -->
  <main class="container my-5">

    <h1 class="text-center mb-4">Carrusel Estereoscópico</h1>

    <!-- Carrusel -->
    <div id="stereoCarousel" class="carousel slide shadow rounded overflow-hidden" data-bs-ride="carousel">
      <div class="carousel-inner">

        <!-- Imagen 1 -->
        <div class="carousel-item active">
          <img src="img/sbs1.jpg" class="d-block w-100" alt="Imagen 1">
        </div>

        <!-- Imagen 2 -->
        <div class="carousel-item">
          <img src="img/sbs2.jpg" class="d-block w-100" alt="Imagen 2">
        </div>

      </div>

      <button class="carousel-control-prev" type="button" data-bs-target="#stereoCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>

      <button class="carousel-control-next" type="button" data-bs-target="#stereoCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>

    <!-- Botones -->
    <div class="text-center my-4 d-flex justify-content-center gap-3 flex-wrap">
      <button class="button" data-front="Side by Side" data-back="Ver SBS" onclick="mostrarSideBySide()"></button>
      <button class="button" data-front="Anaglifo" data-back="Ver 3D" onclick="mostrarAnaglifo()"></button>
    </div>

    <!-- Visor principal -->
    <div class="viewer-container text-center">

      <!-- Etiquetas SBS -->
      <div id="sbsLabels" class="d-flex justify-content-between px-2 mb-2 fw-bold text-secondary">
        <span>Left</span>
        <span>Right</span>
      </div>

      <!-- Imagen SBS -->
      <img id="mainViewer" src="img/SBS1.jpg" class="img-fluid rounded shadow" alt="Visualización estereoscópica">

      <!-- Anaglifo -->
      <div id="anaglifoViewer" class="d-none">
  <img id="anaglifoImage" src="img/ana1.jpg" class="img-fluid rounded shadow" alt="Anaglifo">
</div>

    </div>

  </main>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-3 mt-5">
    <p class="mb-0">Desarrollado por Diana Denise Campos Lozano | ITIC'S | Ambientes Virtuales</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- JS -->
  <script src="js/app.js"></script>
</body>
</html>
